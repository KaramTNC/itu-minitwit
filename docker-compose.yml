networks:
  itu-network:
    name: itu-network
services:
  itu-api-server:
    build: 
      context: .
      dockerfile: docker/api/Dockerfile
    image: itu-api-server
    container_name: api
    networks: 
      - itu-network
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - DATABASE_PATH=/app/db/chat.db
    volumes:
      - ./src/Web/chat.db:/app/db/chat.db

  itu-web-server:
    build: 
      context: .
      dockerfile: docker/web/Dockerfile
    image: itu-web-server
    container_name: web
    networks: 
      - itu-network
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=http://+:5001
    volumes:
      - ./src/Web/chat.db:/app/db/chat.db

