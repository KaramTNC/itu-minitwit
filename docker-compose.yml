networks:
  itu-minitwit-network:
    name: itu-minitwit-network

volumes:
  prometheus_data:
  grafana-storage:
  loki-data:

services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - itu-minitwit-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-storage:/var/lib/grafana
    networks:
      - itu-minitwit-network

  grafana-alloy:
    image: grafana/alloy
    container_name: grafana-alloy
    ports:
      - "12345:12345"
    volumes:
      - ./grafana/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - itu-minitwit-network
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy

  grafana-loki:
    image: grafana/loki
    container_name: grafana-loki
    ports:
      - "3100:3100"
    volumes:
      - ./grafana/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - itu-minitwit-network

  itu-api-server:
    image: ${DOCKER_USERNAME}/itu-api-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: api
    ports:
      - "8080:8080"
      - "9185:9185"
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - OTEL_PROMETHEUS_URI_PREFIX=http://*:9185/
    networks:
      - itu-minitwit-network

  itu-web-server:
    image: ${DOCKER_USERNAME}/itu-web-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: web
    ports:
      - "5001:5001"
      - "9184:9184"
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:5001
      - OTEL_PROMETHEUS_URI_PREFIX=http://*:9184/
    networks:
      - itu-minitwit-network
