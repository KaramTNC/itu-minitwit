networks:
  itu-minitwit-network:
    name: itu-minitwit-network

volumes:
  prometheus_data:
  grafana-storage:

services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - itu-minitwit-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - itu-minitwit-network

  itu-api-server:
    image: ${DOCKER_USERNAME}/itu-api-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: api
    ports:
      - "8080:8080"
      - "9185:9185"
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - OTEL_PROMETHEUS_URI_PREFIX=http://*:9185/
    networks:
      - itu-minitwit-network

  itu-web-server:
    image: ${DOCKER_USERNAME}/itu-web-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: web
    ports:
      - "5001:5001"
      - "9184:9184"
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:5001
      - OTEL_PROMETHEUS_URI_PREFIX=http://*:9184/
    networks:
      - itu-minitwit-network
