name: Upload Document as PDF

on: [push]

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish PDF
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish PDF Document
        uses: shrink/actions-document-publish@v1
        id: publish-document
        with:
          sources: 'report/report.md'

      - name: Debug - find PDF
        run: find . -name "*.pdf" 2>/dev/null

      - name: Commit and Push PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp .publish-docs/document.pdf report/build/BSc_group_d.pdf
          git add -f report/build/BSc_group_d.pdf
          git diff --cached --quiet || (git commit -m "chore: update generated PDF" && git pull --rebase && git push)