name: Docker Build & Publish

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Determine Image Tag
        # If it's a PR, tag as 'staging'. Otherwise (push to main), tag as 'latest'.
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max