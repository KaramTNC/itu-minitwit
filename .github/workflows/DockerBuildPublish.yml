name: Docker Build & Publish

on:
  push:
    branches: [staging]
    paths:
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Log in to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build Web image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: docker/web/Dockerfile
          push: false
          load: true                          # loads image into local Docker daemon for Scout
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:latest
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      #  ADDED
      # 'exit-code: true' means the job fails and the push step below is skipped
      - name: Docker Scout vulnerability scan
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de # v1.18.2
        with:
          command: cves
          image: ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ github.sha }}
          only-severities: critical,high
          exit-code: true                     # aborts pipeline on findings
          sarif-file: scout-web-results.sarif

      - name: Upload Scout results to GitHub Security tab
        if: always()                          # upload even if scan failed, so findings are visible
        uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3 # v3.34.1
        with:
          sarif_file: scout-web-results.sarif
      # Only reached if Scout passed — image is clean
      - name: Push Web image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/itu-web-server:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ github.sha }}


      # ENDED

  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Log in to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build API image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: docker/api/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:latest
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Added
      - name: Docker Scout vulnerability scan
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de # v1.18.2
        with:
          command: cves
          image: ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ github.sha }}
          only-severities: critical,high
          exit-code: true
          sarif-file: scout-api-results.sarif

      - name: Upload Scout results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3 # v3.34.1
        with:
          sarif_file: scout-api-results.sarif
      # END

      # Only reached if Scout passed — image is clean
      - name: Push API image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/itu-api-server:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ github.sha }}

  publish-complete:
    runs-on: ubuntu-latest
    needs: [build-web, build-api]
    steps:
      - run: echo "Both images published successfully"
