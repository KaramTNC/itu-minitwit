name: Docker Build & Publish

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Determine Image Tag
        # If it's a PR, tag as 'staging'. Otherwise (push to main), tag as 'latest'.
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Log in to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build & Push Web image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push API image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
