name: Deploy Production

on:
  workflow_run:
    workflows: [Docker Build & Publish]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    env:
      DB_URL: ${{ secrets.DB_URL }}
      GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
      GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Check for migration changes
        id: migrations
        run: |
          git diff --name-only ${{ github.event.workflow_run.head_commit.id }} origin/main | grep -q 'Migrations/' \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Setup .NET
        if: steps.migrations.outputs.changed == 'true'
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: 8.0.x

      - name: Apply database migrations
        if: steps.migrations.outputs.changed == 'true'
        run: |
          dotnet tool install --global dotnet-ef
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet ef database update --no-build --configuration Release --project src/Infrastructure --startup-project src/Web