name: Deploy Production

on:
  workflow_run:
    workflows: [Docker Build & Publish]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Setup .NET
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: 8.0.x

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Check for migration changes
        id: migrations
        run: |
          git diff --name-only ${{ github.event.workflow_run.head_commit.id }} origin/main | grep -q 'Migrations/' \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Apply database migrations
        if: steps.migrations.outputs.changed == 'true'
        run: dotnet ef database update --no-build --configuration Release --project src/Infrastructure --startup-project src/Web
        env:
          DB_URL: ${{ secrets.DB_URL }}

      - name: Copy files to production server
        run: |
          sed -i 's|${DOCKER_USERNAME}|${{ secrets.DOCKER_USERNAME }}|g' docker-compose.yml
          scp -o StrictHostKeyChecking=no docker-compose.yml prometheus.yml root@46.101.201.186:~/minitwit/

      - name: Create .env file on production server
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            echo 'DB_URL=${{ secrets.DB_URL }}' > ~/minitwit/.env
          "

      - name: Pull and redeploy on production
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            cd ~/minitwit &&
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin &&
            export IMAGE_TAG=latest &&
            docker compose pull &&
            docker compose up -d --remove-orphans
          "

      - name: Health check
        id: healthcheck
        run: |
          sleep 10
          curl --fail http://46.101.201.186:5001 || exit 1

      - name: Rollback on health check failure
        if: failure() && steps.healthcheck.conclusion == 'failure'
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            cd ~/minitwit &&
            docker compose pull ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ github.event.workflow_run.head_commit.id }} &&
            docker compose pull ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ github.event.workflow_run.head_commit.id }} &&
            export IMAGE_TAG=${{ github.event.workflow_run.head_commit.id }} &&
            docker compose up -d --remove-orphans
          "

      - name: Notify on failure
        if: failure()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Deploy failed"
          description: "[${{ github.repository }}] ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          color: 0xff0000
