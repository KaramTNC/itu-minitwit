name: Deploy Production

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.DB_URL }}
      GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
      GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          ref: ${{ inputs.image_tag || github.sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Setup .NET
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: 8.0.x

      - name: Cache migration bundle
        id: cache-efbundle
        uses: actions/cache@v4
        with:
          path: ./efbundle
          key: efbundle-${{ hashFiles('src/Infrastructure/Migrations/**') }}

      - name: Build database migration bundle
        if: steps.cache-efbundle.outputs.cache-hit != 'true'
        run: |
          dotnet tool install --global dotnet-ef --version 8.0.22
          dotnet restore src/Web/Web.csproj
          dotnet ef migrations bundle --self-contained --runtime linux-x64 --configuration Release --project src/Infrastructure --startup-project src/Web --output ./efbundle

      - name: Copy files to production server
        run: |
          rsync -az --checksum -e "ssh -o StrictHostKeyChecking=no" docker-compose.yml docker-stack.yml prometheus.yml grafana/ efbundle root@46.101.201.186:/itu-minitwit/

      - name: Create .env file on production server
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            echo 'DB_URL=${{ secrets.DB_URL }}' > /itu-minitwit/.env
          "

      - name: Apply database migrations on production server
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            cd /itu-minitwit &&
            chmod +x ./efbundle &&
            ./efbundle --connection '${{ secrets.DB_URL }}'
          "

      - name: Ensure Docker Swarm is active
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            swarm_state=\$(docker info --format '{{.Swarm.LocalNodeState}}') &&
            control_available=\$(docker info --format '{{.Swarm.ControlAvailable}}') &&
            if [ \"\$swarm_state\" != 'active' ]; then
              docker swarm init --advertise-addr 46.101.201.186
            elif [ \"\$control_available\" != 'true' ]; then
              docker swarm leave --force &&
              docker swarm init --advertise-addr 46.101.201.186
            fi
          "

      - name: Create Docker secrets on production server
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            if ! docker secret inspect itu_grafana_admin_user >/dev/null 2>&1; then
              printf '%s' '${{ secrets.GF_SECURITY_ADMIN_USER }}' | docker secret create itu_grafana_admin_user -
            fi
            if ! docker secret inspect itu_grafana_admin_password >/dev/null 2>&1; then
              printf '%s' '${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}' | docker secret create itu_grafana_admin_password -
            fi
          "

      - name: Rolling deploy on production
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 root@46.101.201.186 'bash -s' <<'REMOTE'
          set -euo pipefail

          diagnose_service() {
            service="$1"
            echo "::group::${service} tasks"
            timeout 30 docker service ps --no-trunc "$service" || true
            echo "::endgroup::"
            echo "::group::${service} recent logs"
            timeout 60 docker service logs --tail 80 "$service" || true
            echo "::endgroup::"
          }

          wait_service() {
            service="$1"
            expected="$2"

            for attempt in $(seq 1 60); do
              replicas=$(timeout 20 docker service ls --filter "name=${service}" --format '{{.Replicas}}' | head -n 1 || echo "")
              update_state=$(timeout 20 docker service inspect "$service" --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}completed{{end}}' 2>/dev/null || echo missing)
              echo "${service}: replicas=${replicas:-missing}, update=${update_state}, attempt=${attempt}/60"

              if [ "$replicas" = "${expected}/${expected}" ] && [ "$update_state" = "completed" ]; then
                return 0
              fi

              if [ "$update_state" = "paused" ] || [ "$update_state" = "rollback_paused" ]; then
                diagnose_service "$service"
                return 1
              fi

              sleep 10
            done

            diagnose_service "$service"
            return 1
          }

          cd /itu-minitwit
          echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin
          export DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}'
          export IMAGE_TAG='${{ env.IMAGE_TAG }}'
          export DB_URL='${{ secrets.DB_URL }}'
          docker compose down --remove-orphans || true
          docker stack deploy --compose-file docker-stack.yml --with-registry-auth --detach=true itu-minitwit

          wait_service itu-minitwit_itu-web-server 2
          wait_service itu-minitwit_itu-api-server 2
          REMOTE

      - name: Health check
        id: healthcheck
        run: |
          for i in {1..20}; do
            curl --fail http://46.101.201.186:5001/health &&
            curl --fail http://46.101.201.186:8080/health &&
            exit 0
            sleep 2
          done
          echo "Health check failed."
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.healthcheck.conclusion == 'failure'
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            cd /itu-minitwit &&
            docker service rollback itu-minitwit_itu-web-server || true &&
            docker service rollback itu-minitwit_itu-api-server || true
          "

      - name: Notify on failure
        if: failure()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Deploy failed"
          description: "[${{ github.repository }}] ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          color: 0xff0000
