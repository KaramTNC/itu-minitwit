name: Deploy Production

on:
  workflow_run:
    workflows: [Docker Build & Publish]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    env:
      DB_URL: ${{ secrets.DB_URL }}
      GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
      GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Check for migration changes
        id: migrations
        run: |
          git diff --name-only ${{ github.event.workflow_run.head_commit.id }} origin/main | grep -q 'Migrations/' \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Setup .NET
        if: steps.migrations.outputs.changed == 'true'
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: 8.0.x

      - name: Apply database migrations
        if: steps.migrations.outputs.changed == 'true'
        run: |
          dotnet tool install --global dotnet-ef
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet ef database update --no-build --configuration Release --project src/Infrastructure --startup-project src/Web

      - name: Copy files to production server
        run: |
          sed -i 's|${DOCKER_USERNAME}|${{ secrets.DOCKER_USERNAME }}|g' docker-compose.yml
          scp -r -o StrictHostKeyChecking=no docker-compose.yml prometheus.yml grafana root@46.101.201.186:/itu-minitwit/

      - name: Create .env file on production server
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            echo 'DB_URL=${{ secrets.DB_URL }}' > /itu-minitwit/.env
          "

      - name: Pull and redeploy on production
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            cd /itu-minitwit &&
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin &&
            export IMAGE_TAG=latest &&
            export GF_SECURITY_ADMIN_USER='${{ secrets.GF_SECURITY_ADMIN_USER }}' &&
            export GF_SECURITY_ADMIN_PASSWORD='${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}' &&
            docker compose up -d --pull always --remove-orphans --force-recreate
          "

      - name: Health check
        id: healthcheck
        run: |
          for i in {1..20}; do
            curl --fail http://134.122.71.241:5001 && exit 0
            sleep 2
          done
          echo "Health check failed."
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.healthcheck.conclusion == 'failure'
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "
            cd /itu-minitwit &&
            export IMAGE_TAG=${{ github.event.workflow_run.head_commit.id }} &&
            docker compose up -d --pull always --remove-orphans --force-recreate
          "

      - name: Notify on failure
        if: failure()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Deploy failed"
          description: "[${{ github.repository }}] ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          color: 0xff0000
