name: Deploy

# Run only on Main and when the BuildTest workflow succeeds
on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build & Test]
    types: [completed]
    branches: [main]

jobs:
  vagrant-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Stop app on servers
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "pkill -f 'dotnet run --project /itu-minitwit/src/Org.OpenAPITools' || true; pkill -f 'dotnet run --project /itu-minitwit/src/Web' || true"
          ssh -o StrictHostKeyChecking=no root@165.22.66.118 "pkill -f 'dotnet run --project /itu-minitwit/src/Org.OpenAPITools' || true; pkill -f 'dotnet run --project /itu-minitwit/src/Web' || true"

      - name: Apply database migrations
        run: |
          dotnet ef database update --no-build --configuration Release
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_URL }}

      - name: Copy repository files to servers
        run: |
          scp -o StrictHostKeyChecking=no -r ./* root@46.101.201.186:/vagrant/
          scp -o StrictHostKeyChecking=no -r ./* root@165.22.66.118:/vagrant/

      - name: Start app on servers
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no root@46.101.201.186 "cd /itu-minitwit && nohup dotnet run --project src/Org.OpenAPITools >> src/Org.OpenAPITools/dotnet.log 2>&1 & nohup dotnet run --project src/Web >> src/Web/dotnet.log 2>&1 &"
          ssh -o StrictHostKeyChecking=no root@165.22.66.118 "cd /itu-minitwit && nohup dotnet run --project src/Org.OpenAPITools >> src/Org.OpenAPITools/dotnet.log 2>&1 & nohup dotnet run --project src/Web >> src/Web/dotnet.log 2>&1 &"
