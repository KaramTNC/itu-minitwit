name: Smoke Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:staging
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:staging
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  deploy:
    runs-on: ubuntu-latest
    needs: [build-web, build-api]
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Check for migration changes
        id: migrations
        run: |
          git diff --name-only origin/main HEAD | grep -q 'Migrations/' \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Setup .NET
        if: steps.migrations.outputs.changed == 'true'
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Apply database migrations
        if: steps.migrations.outputs.changed == 'true'
        run: |
          dotnet tool install --global dotnet-ef
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet ef database update --no-build --configuration Release --project src/Infrastructure --startup-project src/Web
        env:
          DB_URL: ${{ secrets.DB_URL }}

      - name: Copy files to staging server
        run: |
          sed -i 's|${DOCKER_USERNAME}|${{ secrets.DOCKER_USERNAME }}|g' docker-compose.yml
          scp -r -o StrictHostKeyChecking=no docker-compose.yml prometheus.yml grafana root@134.122.71.241:/itu-minitwit/

      - name: Create .env file on staging server
        run: |
          ssh -o StrictHostKeyChecking=no root@134.122.71.241 "
            echo 'DB_URL=${{ secrets.DB_URL }}' > /itu-minitwit/.env
          "

      - name: Pull and redeploy on staging
        run: |
          ssh -o StrictHostKeyChecking=no root@134.122.71.241 "
            cd /itu-minitwit &&
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin &&
            export IMAGE_TAG=staging &&
            docker compose up -d --pull always --remove-orphans
          "

      - name: Smoke test
        run: |
          for i in {1..12}; do
            curl --fail http://134.122.71.241:5001 && exit 0
            sleep 2
          done
          echo "Health check failed."
          exit 1
