name: Smoke Deploy

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"
      - "docker-stack.yml"
      - "prometheus.yml"
      - "grafana/**"

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Log in to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build & Push Web image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:staging
            ${{ secrets.DOCKER_USERNAME }}/itu-web-server:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Log in to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build & Push API image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:staging
            ${{ secrets.DOCKER_USERNAME }}/itu-api-server:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  deploy:
    runs-on: ubuntu-latest
    needs: [build-web, build-api]
    env:
      DB_URL: ${{ secrets.DB_URL }}
      GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
      GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
      IMAGE_TAG: ${{ github.sha }}
      STAGING_HOST: root@134.122.71.241
      SSH_COMMON_ARGS: -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=15 -o ServerAliveCountMax=4
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Cache migration bundle
        id: cache-efbundle
        uses: actions/cache@v4
        with:
          path: ./efbundle
          key: efbundle-${{ hashFiles('src/Infrastructure/Migrations/**') }}

      - name: Setup .NET
        if: steps.cache-efbundle.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: 8.0.x

      - name: Build database migration bundle
        if: steps.cache-efbundle.outputs.cache-hit != 'true'
        run: |
          dotnet tool install --global dotnet-ef --version 8.0.22
          dotnet restore src/Web/Web.csproj
          dotnet ef migrations bundle --self-contained --runtime linux-x64 --configuration Release --project src/Infrastructure --startup-project src/Web --output ./efbundle

      - name: Copy config files to staging server
        run: |
          timeout 45 rsync -az -e "ssh $SSH_COMMON_ARGS" docker-compose.yml docker-stack.yml prometheus.yml grafana/ "$STAGING_HOST:/itu-minitwit/"

      - name: Copy migration bundle to staging server
        if: steps.cache-efbundle.outputs.cache-hit != 'true'
        run: rsync -az -e "ssh -o StrictHostKeyChecking=no" efbundle root@134.122.71.241:/itu-minitwit/

      - name: Create .env file on staging server
        run: |
          timeout 30 ssh $SSH_COMMON_ARGS "$STAGING_HOST" "
            echo 'DB_URL=${{ secrets.DB_URL }}' > /itu-minitwit/.env
          "

      - name: Apply database migrations on staging server
        if: steps.cache-efbundle.outputs.cache-hit != 'true'
        run: |
          timeout 420 ssh $SSH_COMMON_ARGS "$STAGING_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /itu-minitwit
          chmod +x ./efbundle

          echo "::group::migration host diagnostics"
          date -Is
          uptime || true
          free -h || true
          df -h / || true
          echo "::endgroup::"

          for attempt in 1 2 3; do
            echo "Running migrations attempt ${attempt}/3"
            if timeout 180 ./efbundle --verbose --connection '${{ secrets.DB_URL }}'; then
              exit 0
            fi

            exit_code=$?
            echo "Migration attempt ${attempt} failed with exit code ${exit_code}"
            if [ "$attempt" -lt 3 ]; then
              echo "Retrying migrations in 15 seconds..."
              sleep 15
            fi
          done

          echo "Migration failed after 3 attempts"
          exit 1
          REMOTE

      - name: Ensure Docker Swarm is active
        run: |
          timeout 75 ssh $SSH_COMMON_ARGS "$STAGING_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          swarm_state="$(timeout 20 docker info --format '{{.Swarm.LocalNodeState}}' 2>/dev/null || echo unknown)"
          control_available="$(timeout 20 docker info --format '{{.Swarm.ControlAvailable}}' 2>/dev/null || echo false)"

          if [ "$swarm_state" != "active" ] || [ "$control_available" != "true" ]; then
            timeout 15 docker swarm leave --force >/dev/null 2>&1 || true
            timeout 25 docker swarm init --advertise-addr 134.122.71.241 >/dev/null 2>&1 || true
          fi

          final_state="$(timeout 20 docker info --format '{{.Swarm.LocalNodeState}}' 2>/dev/null || echo unknown)"
          final_control="$(timeout 20 docker info --format '{{.Swarm.ControlAvailable}}' 2>/dev/null || echo false)"
          echo "swarm_state=${final_state}, control_available=${final_control}"
          [ "$final_state" = "active" ] && [ "$final_control" = "true" ]
          REMOTE

      - name: Create Docker secrets on staging server
        run: |
          timeout 45 ssh $SSH_COMMON_ARGS "$STAGING_HOST" "
            if ! timeout 15 docker secret inspect itu_grafana_admin_user >/dev/null 2>&1; then
              printf '%s' '${{ secrets.GF_SECURITY_ADMIN_USER }}' | timeout 15 docker secret create itu_grafana_admin_user -
            fi
            if ! timeout 15 docker secret inspect itu_grafana_admin_password >/dev/null 2>&1; then
              printf '%s' '${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}' | timeout 15 docker secret create itu_grafana_admin_password -
            fi
          "

      - name: Rolling deploy on staging
        run: |
          timeout 420 ssh $SSH_COMMON_ARGS "$STAGING_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          diagnose_service() {
            service="$1"
            echo "::group::${service} tasks"
            docker service ps --no-trunc "$service" || true
            echo "::endgroup::"
            echo "::group::${service} recent logs"
            docker service logs --tail 80 "$service" 2>&1 || true
            echo "::endgroup::"
          }

          wait_service() {
            service="$1"
            expected="$2"

            for attempt in $(seq 1 36); do
              replicas=$(timeout 15 docker service ls --filter "name=${service}" --format '{{.Replicas}}' 2>/dev/null | head -n 1 || echo "0/0")
              update_state=$(timeout 15 docker service inspect "$service" --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}completed{{end}}' 2>/dev/null || echo missing)
              echo "${service}: replicas=${replicas:-missing}, update=${update_state}, attempt=${attempt}/36"

              if [ "$replicas" = "${expected}/${expected}" ] && [ "$update_state" = "completed" ]; then
                return 0
              fi

              if [ "$update_state" = "paused" ] || [ "$update_state" = "rollback_paused" ]; then
                diagnose_service "$service"
                return 1
              fi

              sleep 5
            done

            diagnose_service "$service"
            return 1
          }

          cd /itu-minitwit
          echo "::group::pre-deploy host usage"
          df -h /
          timeout 20 docker system df || true
          echo "::endgroup::"
          echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin
          export DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}'
          export IMAGE_TAG='${{ env.IMAGE_TAG }}'
          export DB_URL='${{ secrets.DB_URL }}'

          docker pull "${DOCKER_USERNAME}/itu-web-server:${IMAGE_TAG}" || true
          docker pull "${DOCKER_USERNAME}/itu-api-server:${IMAGE_TAG}" || true

          docker stack deploy --compose-file docker-stack.yml --with-registry-auth --detach=true itu-minitwit

          wait_service itu-minitwit_itu-web-server 2
          wait_service itu-minitwit_itu-api-server 2
          REMOTE

      - name: Smoke test
        id: smoketest
        run: |
          for i in {1..20}; do
            curl --silent --show-error --fail --connect-timeout 3 --max-time 8 http://134.122.71.241:5001/health &&
            curl --silent --show-error --fail --connect-timeout 3 --max-time 8 http://134.122.71.241:8080/health &&
            exit 0
            sleep 2
          done
          echo "Health check failed."
          timeout 90 ssh $SSH_COMMON_ARGS "$STAGING_HOST" 'bash -s' <<'REMOTE'
          set +e
          echo "::group::staging service states"
          docker service ls
          docker service ps --no-trunc itu-minitwit_itu-web-server
          docker service ps --no-trunc itu-minitwit_itu-api-server
          echo "::endgroup::"
          echo "::group::staging recent logs"
          docker service logs --tail 120 itu-minitwit_itu-web-server 2>&1 || true
          docker service logs --tail 120 itu-minitwit_itu-api-server 2>&1 || true
          echo "::endgroup::"
          REMOTE
          exit 1

      - name: Cleanup unused Docker artifacts on staging
        if: success()
        continue-on-error: true
        run: |
          timeout 180 ssh $SSH_COMMON_ARGS "$STAGING_HOST" 'bash -s' <<'REMOTE'
          set -u
          echo "::group::pre-cleanup docker usage"
          df -h /
          timeout 20 docker system df || true
          echo "::endgroup::"

          timeout 30 docker container prune -f || true
          timeout 60 docker image prune -a -f || true
          timeout 60 docker builder prune -a -f || true

          echo "::group::post-cleanup docker usage"
          df -h /
          timeout 20 docker system df || true
          echo "::endgroup::"
          REMOTE

      - name: Rollback on smoke test failure
        if: failure() && steps.smoketest.conclusion == 'failure'
        run: |
          timeout 60 ssh $SSH_COMMON_ARGS "$STAGING_HOST" "
            cd /itu-minitwit &&
            docker service rollback itu-minitwit_itu-web-server || true &&
            docker service rollback itu-minitwit_itu-api-server || true
          "
