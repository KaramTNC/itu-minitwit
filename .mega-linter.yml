# Configuration file for MegaLinter
# See all available variables at https://megalinter.io/latest/config-file/

# Apply fixes automatically
APPLY_FIXES: all

# Only lint files changed in the PR — full codebase is now clean
VALIDATE_ALL_CODEBASE: false

# Only enable linters relevant to your stack
ENABLE_LINTERS:
  # C#
  - CSHARP_DOTNET_FORMAT
  - CSHARP_CSHARPIER

  # YAML
  - YAML_YAMLLINT
  - YAML_PRETTIER

  # Python
  - PYTHON_RUFF # Fast linter + formatter (replaces flake8/isort/pyupgrade)
  - PYTHON_MYPY # Type checking
  - PYTHON_BANDIT # Security scanning
  - PYTHON_BLACK # Code formatting

  # Bash / Shell
  - BASH_SHELLCHECK # Bug & style checking
  - BASH_SHFMT # Formatting

  # Docker
  - DOCKERFILE_HADOLINT # Dockerfile best practices

  # Vagrant
  - RUBY_RUBOCOP # Vagrantfiles are Ruby; RuboCop catches issues

  # JSON
  - JSON_JSONLINT
  - JSON_PRETTIER

  # Markdown
  - MARKDOWN_MARKDOWNLINT
  - MARKDOWN_MARKDOWN_LINK_CHECK

  # Repository-wide
  - REPOSITORY_SECRETLINT # Detect accidentally committed secrets
  - REPOSITORY_TRIVY # Vulnerability scanning
  - REPOSITORY_CHECKOV # IaC security (covers Dockerfiles, GitHub Actions, etc.)

SHOW_ELAPSED_TIME: true

# Linter-specific config
YAML_YAMLLINT_CONFIG_FILE: .yamllint.yml

PYTHON_BLACK_ARGUMENTS: --line-length 120
PYTHON_RUFF_ARGUMENTS: --line-length 120
PYTHON_MYPY_ARGUMENTS: --ignore-missing-imports

MARKDOWN_MARKDOWNLINT_CONFIG_FILE: .markdownlint.json

# Skip OpenAPI security checks — this API is intentionally public with no auth
# Skip CKV_OPENAPI_21 — maxItems constraints are not applicable to this API
# Skip CKV2_GHA_1 — top-level permissions are managed at the job level in all workflows
REPOSITORY_CHECKOV_ARGUMENTS: >-
  --skip-check CKV_OPENAPI_4,CKV_OPENAPI_5,CKV_OPENAPI_21,CKV2_GHA_1

# Paths/files to ignore globally
FILTER_REGEX_EXCLUDE: >-
  (\.git/
  |\.venv/
  |node_modules/
  |\.vagrant/
  |bin/
  |obj/
  |dist/
  |__pycache__)
